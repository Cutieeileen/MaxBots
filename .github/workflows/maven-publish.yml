name: Maven Package

on:
  release:
    types: [created]

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        server-id: central
        settings-path: ${{ github.workspace }}
        server-username: SONATYPE_USERNAME
        server-password: SONATYPE_PASSWORD

    - name: Import GPG key
      run: |
        gpg --batch --yes --import --passphrase "${{ secrets.GPG_PASSPHRASE }}" <(echo "${{ secrets.GPG_PRIVATE_KEY }}")

    - name: Publish to Maven Central
      run: mvn -B deploy -s $GITHUB_WORKSPACE/settings.xml -Dgpg.passphrase=${{ secrets.GPG_PASSPHRASE }}
      env:
        SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
        SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
